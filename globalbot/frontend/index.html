<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document RAG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f4; --surface: #ffffff; --border: #e5e7eb;
  --text: #111827; --muted: #6b7280; --accent: #2563eb;
  --accent-light: #eff6ff; --danger: #ef4444;
  --bbox-text: #2563eb; --bbox-table: #d97706;
  --bbox-image: #059669; --bbox-chart: #dc2626; --bbox-formula: #7c3aed;
  --sidebar: 280px; --viewer: 1fr; --chat: 380px;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
.layout { display: grid; grid-template-columns: var(--sidebar) var(--viewer) var(--chat); height: 100vh; }
.panel { display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.panel-header h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.panel-body { flex: 1; overflow-y: auto; }

/* Sidebar */
.sidebar { border-right: 1px solid var(--border); background: var(--surface); }
.upload-zone { margin: 12px; border: 1.5px dashed var(--border); border-radius: 8px; padding: 20px 12px; text-align: center; cursor: pointer; transition: border-color .15s; }
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-light); }
.upload-zone input { display: none; }
.upload-zone p { font-size: 12px; color: var(--muted); margin-top: 6px; }
.upload-zone .icon { font-size: 20px; }
.doc-list { padding: 0 8px 8px; }
.doc-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background .1s; margin-bottom: 2px; }
.doc-item:hover { background: var(--bg); }
.doc-item.active { background: var(--accent-light); }
.doc-item .doc-info { flex: 1; min-width: 0; }
.doc-item .doc-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-item .doc-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.doc-item .doc-del { opacity: 0; font-size: 14px; color: var(--danger); padding: 2px 4px; border-radius: 4px; border: none; background: none; cursor: pointer; }
.doc-item:hover .doc-del { opacity: 1; }
.status-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
.status-ready    { background: #dcfce7; color: #166534; }
.status-processing { background: #fef9c3; color: #854d0e; }
.status-error    { background: #fee2e2; color: #991b1b; }
.status-pending  { background: #f3f4f6; color: #6b7280; }

/* Viewer */
.viewer-panel { border-right: 1px solid var(--border); background: var(--bg); }
.viewer-toolbar { padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.viewer-toolbar button { padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); cursor: pointer; }
.viewer-toolbar button:hover { background: var(--bg); }
.viewer-toolbar .page-info { font-size: 12px; color: var(--muted); }
.viewer-content { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 16px; }
.page-wrapper { position: relative; display: inline-block; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.page-wrapper canvas.pdf-canvas { display: block; }
.page-wrapper canvas.bbox-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
.page-label { font-size: 11px; color: var(--muted); text-align: center; margin-top: 4px; }

/* Chat */
.chat-panel { background: var(--surface); }
.chat-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.chat-tab { flex: 1; padding: 10px; font-size: 12px; font-weight: 500; text-align: center; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent; }
.chat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 90%; }
.msg-user { align-self: flex-end; background: var(--accent); color: #fff; padding: 8px 12px; border-radius: 12px 12px 2px 12px; font-size: 13px; line-height: 1.5; }
.msg-assistant { align-self: flex-start; }
.msg-bubble { background: var(--bg); padding: 8px 12px; border-radius: 2px 12px 12px 12px; font-size: 13px; line-height: 1.5; }
.msg-sources { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.source-chip { font-size: 11px; padding: 3px 8px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; gap: 4px; transition: background .1s; }
.source-chip:hover { background: var(--accent-light); border-color: var(--accent); }
.source-chip .chip-label { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.chat-input-area { padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 6px; }
.chat-input-area textarea { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; resize: none; height: 60px; font-family: inherit; outline: none; }
.chat-input-area textarea:focus { border-color: var(--accent); }
.send-btn { padding: 0 14px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.send-btn:hover { background: #1d4ed8; }
.send-btn:disabled { opacity: .5; cursor: default; }
.typing { align-self: flex-start; padding: 8px 12px; background: var(--bg); border-radius: 2px 12px 12px 12px; font-size: 12px; color: var(--muted); }
.no-doc-hint { padding: 20px; text-align: center; font-size: 12px; color: var(--muted); }
.empty-viewer { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="layout">

<!-- SIDEBAR: document list -->
<div class="panel sidebar">
  <div class="panel-header"><h2>Documents</h2></div>
  <div class="panel-body">
    <label class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.docx" multiple>
      <div class="icon">+</div>
      <strong style="font-size:13px">Upload file</strong>
      <p>PDF, DOCX, PNG, JPG</p>
    </label>
    <div class="doc-list" id="docList"></div>
  </div>
</div>

<!-- VIEWER: PDF/image + bbox overlay -->
<div class="panel viewer-panel">
  <div class="viewer-toolbar" id="viewerToolbar" style="display:none">
    <button onclick="changePage(-1)">&#8592;</button>
    <span class="page-info" id="pageInfo">1 / 1</span>
    <button onclick="changePage(1)">&#8594;</button>
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
    <span class="page-info" id="docTitle" style="margin-left:auto;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
  </div>
  <div class="viewer-content" id="viewerContent">
    <div class="empty-viewer">Select a document to view</div>
  </div>
</div>

<!-- CHAT -->
<div class="panel chat-panel">
  <div class="chat-tabs">
    <button class="chat-tab active" id="tabDoc" onclick="switchTab('doc')">Document Q&amp;A</button>
    <button class="chat-tab" id="tabKb" onclick="switchTab('kb')">Knowledge Base</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="no-doc-hint" id="chatHint">Select a document and ask a question.</div>
  </div>
  <div class="chat-input-area">
    <textarea id="chatInput" placeholder="Ask anything..." onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

</div>

<script>
const API = '';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const LABEL_COLORS = {
  text: '#2563eb', list_item: '#7c3aed', table: '#d97706',
  image: '#059669', chart: '#dc2626', formula: '#0891b2',
};

let state = {
  docs: [],
  activeDocId: null,
  pdfDoc: null,
  pdfPages: {},
  scale: 1.5,
  currentPage: 1,
  totalPages: 1,
  highlightedBboxes: [],
  tab: 'doc',
  chatHistory: { doc: [], kb: [] },
};

// ─── Document list ───────────────────────────────────────────────────────────

async function loadDocs() {
  const res = await fetch(`${API}/api/documents`);
  state.docs = await res.json();
  renderDocList();
}

function renderDocList() {
  const el = document.getElementById('docList');
  if (!state.docs.length) {
    el.innerHTML = '<p style="font-size:12px;color:var(--muted);padding:8px 10px">No documents yet</p>';
    return;
  }
  el.innerHTML = state.docs.map(d => `
    <div class="doc-item ${d.doc_id === state.activeDocId ? 'active' : ''}" onclick="openDoc('${d.doc_id}')">
      <div class="doc-info">
        <div class="doc-name">${d.filename}</div>
        <div class="doc-meta">${d.pages ? d.pages + ' pages · ' : ''}${d.blocks_count || 0} blocks</div>
      </div>
      <span class="status-badge status-${d.status}">${d.status}</span>
      <button class="doc-del" onclick="deleteDoc(event,'${d.doc_id}')">&#x2715;</button>
    </div>
  `).join('');
}

async function deleteDoc(e, docId) {
  e.stopPropagation();
  if (!confirm('Delete this document?')) return;
  await fetch(`${API}/api/documents/${docId}`, { method: 'DELETE' });
  if (state.activeDocId === docId) { state.activeDocId = null; clearViewer(); }
  loadDocs();
}

// ─── File upload ──────────────────────────────────────────────────────────────

document.getElementById('fileInput').addEventListener('change', e => {
  [...e.target.files].forEach(uploadFile);
  e.target.value = '';
});

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  [...e.dataTransfer.files].forEach(uploadFile);
});

async function uploadFile(file) {
  const fd = new FormData();
  fd.append('file', file);
  await fetch(`${API}/api/documents`, { method: 'POST', body: fd });
  loadDocs();
  setTimeout(() => pollReady(), 3000);
}

function pollReady() {
  loadDocs();
  const pending = state.docs.some(d => d.status === 'processing' || d.status === 'pending');
  if (pending) setTimeout(pollReady, 4000);
}

// ─── Viewer ───────────────────────────────────────────────────────────────────

async function openDoc(docId) {
  state.activeDocId = docId;
  state.highlightedBboxes = [];
  state.pdfPages = {};
  state.currentPage = 1;
  renderDocList();

  const rec = state.docs.find(d => d.doc_id === docId);
  document.getElementById('docTitle').textContent = rec?.filename || '';

  const url = `${API}/api/documents/${docId}/file`;
  const head = await fetch(url, { method: 'HEAD' }).catch(() => null);
  const mime = rec?.mime_type || '';

  if (mime === 'application/pdf') {
    await loadPdf(docId, url);
  } else {
    loadImage(docId, url);
  }
  document.getElementById('viewerToolbar').style.display = 'flex';
}

async function loadPdf(docId, url) {
  const pdf = await pdfjsLib.getDocument(url).promise;
  state.pdfDoc = pdf;
  state.totalPages = pdf.numPages;
  updatePageInfo();

  const content = document.getElementById('viewerContent');
  content.innerHTML = '';

  for (let p = 1; p <= pdf.numPages; p++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.dataset.page = p;

    const pdfCanvas = document.createElement('canvas');
    pdfCanvas.className = 'pdf-canvas';
    const bboxCanvas = document.createElement('canvas');
    bboxCanvas.className = 'bbox-canvas';

    wrapper.appendChild(pdfCanvas);
    wrapper.appendChild(bboxCanvas);

    const label = document.createElement('div');
    label.className = 'page-label';
    label.textContent = `Page ${p}`;
    content.appendChild(wrapper);
    content.appendChild(label);

    renderPdfPage(pdf, p, pdfCanvas, bboxCanvas);
  }
}

async function renderPdfPage(pdf, pageNum, pdfCanvas, bboxCanvas) {
  const page = await pdf.getPage(pageNum);
  const vp = page.getViewport({ scale: state.scale });
  pdfCanvas.width = bboxCanvas.width = vp.width;
  pdfCanvas.height = bboxCanvas.height = vp.height;
  bboxCanvas.style.width = pdfCanvas.style.width = vp.width + 'px';
  bboxCanvas.style.height = pdfCanvas.style.height = vp.height + 'px';

  state.pdfPages[pageNum] = { canvas: pdfCanvas, bboxCanvas, vp };
  await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport: vp }).promise;
  redrawBboxes();
}

function loadImage(docId, url) {
  const content = document.getElementById('viewerContent');
  const wrapper = document.createElement('div');
  wrapper.className = 'page-wrapper';
  wrapper.dataset.page = 1;

  const img = new Image();
  const pdfCanvas = document.createElement('canvas');
  pdfCanvas.className = 'pdf-canvas';
  const bboxCanvas = document.createElement('canvas');
  bboxCanvas.className = 'bbox-canvas';

  img.onload = () => {
    const w = img.naturalWidth * state.scale;
    const h = img.naturalHeight * state.scale;
    pdfCanvas.width = bboxCanvas.width = w;
    pdfCanvas.height = bboxCanvas.height = h;
    pdfCanvas.getContext('2d').drawImage(img, 0, 0, w, h);
    state.pdfPages[1] = { canvas: pdfCanvas, bboxCanvas, vp: { width: w, height: h, scale: state.scale, origW: img.naturalWidth, origH: img.naturalHeight } };
    redrawBboxes();
  };
  img.src = url;

  wrapper.appendChild(pdfCanvas);
  wrapper.appendChild(bboxCanvas);
  content.innerHTML = '';
  content.appendChild(wrapper);
  state.totalPages = 1;
  updatePageInfo();
}

function clearViewer() {
  document.getElementById('viewerContent').innerHTML = '<div class="empty-viewer">Select a document to view</div>';
  document.getElementById('viewerToolbar').style.display = 'none';
  state.pdfDoc = null;
  state.pdfPages = {};
}

function changePage(delta) {
  const next = state.currentPage + delta;
  if (next < 1 || next > state.totalPages) return;
  state.currentPage = next;
  updatePageInfo();
  scrollToPage(next);
}

function scrollToPage(pageNum) {
  const wrapper = document.querySelector(`.page-wrapper[data-page="${pageNum}"]`);
  if (wrapper) wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updatePageInfo() {
  document.getElementById('pageInfo').textContent = `${state.currentPage} / ${state.totalPages}`;
}

function zoomIn()  { state.scale = Math.min(3, state.scale + 0.25); reloadViewer(); }
function zoomOut() { state.scale = Math.max(0.5, state.scale - 0.25); reloadViewer(); }

function reloadViewer() {
  if (state.activeDocId) openDoc(state.activeDocId);
}

// ─── BBox drawing ─────────────────────────────────────────────────────────────

function redrawBboxes() {
  for (const [pageNum, pg] of Object.entries(state.pdfPages)) {
    const ctx = pg.bboxCanvas.getContext('2d');
    ctx.clearRect(0, 0, pg.bboxCanvas.width, pg.bboxCanvas.height);
  }
  for (const b of state.highlightedBboxes) {
    drawBbox(b, false);
  }
}

function drawBbox(bbox_info, flash) {
  const { page, bbox, label, active } = bbox_info;
  const pg = state.pdfPages[page];
  if (!pg || !bbox || bbox.length < 4) return;

  const scaleX = pg.bboxCanvas.width  / (pg.vp.origW || (pg.vp.width / state.scale));
  const scaleY = pg.bboxCanvas.height / (pg.vp.origH || (pg.vp.height / state.scale));

  // For PDF.js pages, the viewport already handles scaling
  const isImage = !!pg.vp.origW;
  const sx = isImage ? scaleX : state.scale;
  const sy = isImage ? scaleY : state.scale;

  const [x0, y0, x1, y1] = bbox;
  const x = x0 * sx, y = y0 * sy, w = (x1 - x0) * sx, h = (y1 - y0) * sy;

  const color = LABEL_COLORS[label] || '#2563eb';
  const ctx = pg.bboxCanvas.getContext('2d');

  ctx.strokeStyle = color;
  ctx.lineWidth = active ? 2.5 : 1.5;
  ctx.setLineDash(active ? [] : [4, 3]);
  ctx.fillStyle = color + (active ? '22' : '11');
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 3);
  ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);

  if (flash) {
    let alpha = 0.5;
    let up = false;
    let frames = 0;
    const blink = () => {
      ctx.clearRect(x - 4, y - 4, w + 8, h + 8);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.fillStyle = color + Math.round(alpha * 255).toString(16).padStart(2, '0');
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 3); ctx.fill(); ctx.stroke();
      alpha = up ? alpha + 0.05 : alpha - 0.05;
      if (alpha >= 0.5) up = false;
      if (alpha <= 0.1) up = true;
      frames++;
      if (frames < 40) requestAnimationFrame(blink);
      else redrawBboxes();
    };
    requestAnimationFrame(blink);
  }
}

function highlightSources(retrieved_docs) {
  state.highlightedBboxes = retrieved_docs.map((d, i) => ({
    ...d, active: i === 0
  }));
  redrawBboxes();
}

function focusSource(doc) {
  state.highlightedBboxes = state.highlightedBboxes.map(b => ({
    ...b, active: b.chunk_id === doc.chunk_id
  }));
  redrawBboxes();
  scrollToPage(doc.page);
  drawBbox({ ...doc, active: true }, true);
  state.currentPage = doc.page;
  updatePageInfo();
}

// ─── Chat ─────────────────────────────────────────────────────────────────────

function switchTab(tab) {
  state.tab = tab;
  document.getElementById('tabDoc').classList.toggle('active', tab === 'doc');
  document.getElementById('tabKb').classList.toggle('active', tab === 'kb');
  renderChat();
}

function renderChat() {
  const msgs = document.getElementById('chatMessages');
  const history = state.chatHistory[state.tab];
  if (!history.length) {
    msgs.innerHTML = `<div class="no-doc-hint">${state.tab === 'doc' ? 'Select a document and ask a question.' : 'Ask anything from the knowledge base.'}</div>`;
    return;
  }
  msgs.innerHTML = history.map(m => renderMessage(m)).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function renderMessage(m) {
  if (m.role === 'user') {
    return `<div class="msg"><div class="msg-user">${escHtml(m.content)}</div></div>`;
  }
  const chips = (m.retrieved_docs || []).map((d, i) => {
    const color = LABEL_COLORS[d.label] || '#6b7280';
    return `<span class="source-chip" onclick="focusSource(${JSON.stringify(d).replace(/"/g,'&quot;')})">
      <span class="chip-label" style="background:${color}"></span>
      p.${d.page} · ${d.label} · ${Math.round(d.score * 100)}%
    </span>`;
  }).join('');
  return `<div class="msg msg-assistant">
    <div class="msg-bubble">${escHtml(m.content)}</div>
    ${chips ? `<div class="msg-sources">${chips}</div>` : ''}
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  if (state.tab === 'doc' && !state.activeDocId) {
    alert('Please select a document first.'); return;
  }

  input.value = '';
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  const history = state.chatHistory[state.tab];
  history.push({ role: 'user', content: text });
  renderChat();
  addTyping();

  try {
    let url, body;
    if (state.tab === 'doc') {
      url = `${API}/api/chat/document`;
      body = { doc_id: state.activeDocId, messages: history.filter(m => m.role === 'user' || m.role === 'assistant'), k: 5 };
    } else {
      url = `${API}/api/chat/knowledge`;
      body = { messages: history.filter(m => m.role === 'user' || m.role === 'assistant'), k: 5 };
    }

    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();

    removeTyping();
    const msg = { role: 'assistant', content: data.content, retrieved_docs: data.retrieved_docs || [] };
    history.push(msg);
    renderChat();

    if (msg.retrieved_docs.length) highlightSources(msg.retrieved_docs);

  } catch (err) {
    removeTyping();
    history.push({ role: 'assistant', content: 'Error: ' + err.message, retrieved_docs: [] });
    renderChat();
  }

  btn.disabled = false;
}

function addTyping() {
  const msgs = document.getElementById('chatMessages');
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.textContent = 'Thinking...';
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ─── Init ─────────────────────────────────────────────────────────────────────

loadDocs();
setInterval(loadDocs, 8000);
</script>
</body>
</html>
